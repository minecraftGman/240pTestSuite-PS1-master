name: Build PS1 240p Test Suite
 
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Build with PSXSDK (Docker)
        # root670/docker-psxsdk bundles psx-gcc, elf2exe, systemcnf,
        # mkisofs and mkpsxiso, which is exactly what this Makefile needs.
        run: |
          docker run --rm -v "$PWD:/build" root670/docker-psxsdk make
 
      - name: Show build output
        run: ls -laR binary
 
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 240pTestSuite-PS1
          path: |
            binary/*.bin
            binary/*.cue
            binary/*.exe
          if-no-files-found: warn
